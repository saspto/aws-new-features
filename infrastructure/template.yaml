AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS New Features Tracker - full-stack application

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  FeaturesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aws-features
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: guid
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: pub_date
          AttributeType: S
      KeySchema:
        - AttributeName: guid
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusPubDateIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: pub_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── S3: Summaries ─────────────────────────────────────────────────────────
  SummariesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'aws-features-summaries-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTiering
            Status: Enabled
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 30

  # ── S3: Frontend ──────────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'aws-features-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── SQS ───────────────────────────────────────────────────────────────────
  FeaturesDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: aws-features-dlq
      MessageRetentionPeriod: 604800  # 7 days

  FeaturesQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: aws-features-queue
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FeaturesDLQ.Arn
        maxReceiveCount: 3

  # ── SSM Parameters ────────────────────────────────────────────────────────
  BedrockModelIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/features/bedrock-model-id
      Type: String
      Value: anthropic.claude-haiku-4-5-20251001-v1:0

  LastFetchedParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /app/features/last-fetched
      Type: String
      Value: 'never'

  # ── IAM Roles ─────────────────────────────────────────────────────────────
  FetcherRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FetcherPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt FeaturesTable.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt FeaturesQueue.Arn
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/app/features/*'

  SummarizerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SummarizerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt FeaturesTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub '${SummariesBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0'
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt FeaturesQueue.Arn

  ApiRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt FeaturesTable.Arn
                  - !Sub '${FeaturesTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  # ── Lambda: Fetcher ───────────────────────────────────────────────────────
  FetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'aws-features-fetcher-${Environment}'
      CodeUri: ../backend/
      Handler: fetcher/handler.lambda_handler
      MemorySize: 256
      Timeout: 60
      Role: !GetAtt FetcherRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref FeaturesTable
          QUEUE_URL: !Ref FeaturesQueue
          SSM_PARAM_PREFIX: /app/features
      Events:
        ScheduleEvent:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: 'rate(6 hours)'
            ScheduleExpressionTimezone: UTC

  # ── Lambda: Summarizer ────────────────────────────────────────────────────
  SummarizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'aws-features-summarizer-${Environment}'
      CodeUri: ../backend/
      Handler: summarizer/handler.lambda_handler
      MemorySize: 512
      Timeout: 90
      Role: !GetAtt SummarizerRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref FeaturesTable
          BUCKET_NAME: !Ref SummariesBucket
          BEDROCK_MODEL_ID: anthropic.claude-haiku-4-5-20251001-v1:0
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt FeaturesQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures
            ScalingConfig:
              MaximumConcurrency: 2

  # ── Lambda: API ───────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'aws-features-api-${Environment}'
      CodeUri: ../backend/
      Handler: api/handler.lambda_handler
      MemorySize: 256
      Timeout: 10
      Role: !GetAtt ApiRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref FeaturesTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ── CloudFront OAC ────────────────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'aws-features-oac-${Environment}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ── CloudFront Distribution ───────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: '/api/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ── CloudWatch Alarms ─────────────────────────────────────────────────────
  SummarizerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'aws-features-summarizer-errors-${Environment}'
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref SummarizerFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DLQMessagesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'aws-features-dlq-messages-${Environment}'
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FeaturesDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  ApiGatewayURL:
    Description: API Gateway URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  FrontendBucketName:
    Description: Frontend S3 bucket name
    Value: !Ref FrontendBucket

  SummariesBucketName:
    Description: Summaries S3 bucket name
    Value: !Ref SummariesBucket

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref FeaturesTable
